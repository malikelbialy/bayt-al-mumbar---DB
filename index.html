<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم | بيت الممبار</title>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#FAF3E7; --surface:#FFFCF5; --maroon:#6B1E23; --maroon-dark:#4A1418;
    --gold:#C89B3C; --olive:#4A5D3A; --ink:#2B1B14; --muted:#8A7A6B; --line:rgba(43,27,20,.14);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;}
  h1,h2,.display{font-family:'Aref Ruqaa',serif;}

  /* login */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  #login-screen input{padding:12px 16px;border:1.5px solid var(--maroon);border-radius:8px;font-size:15px;width:240px;text-align:center;}
  #login-screen button{background:var(--maroon);color:#fff3e0;border:none;padding:12px 24px;border-radius:8px;font-weight:900;cursor:pointer;}
  #login-error{color:#c0392b;font-size:13px;min-height:16px;}

  header{background:var(--maroon);color:#fff3e0;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;}
  header .display{margin:0;font-size:22px;}
  header button{background:var(--gold);border:none;color:var(--maroon-dark);padding:8px 14px;border-radius:20px;font-weight:700;cursor:pointer;}

  .tabs{display:flex;gap:8px;padding:16px 22px 0;flex-wrap:wrap;}
  .tab{background:var(--surface);border:1.5px solid var(--maroon);color:var(--maroon);padding:8px 18px;border-radius:20px 20px 0 0;font-weight:700;cursor:pointer;}
  .tab.active{background:var(--maroon);color:#fff3e0;}

  .panel{display:none;padding:20px 22px 60px;max-width:1100px;margin:0 auto;}
  .panel.active{display:block;}

  .stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px 20px;min-width:120px;}
  .stat b{display:block;font-size:22px;color:var(--maroon);}
  .stat span{font-size:12px;color:var(--muted);}

  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .filter-row button{background:var(--surface);border:1px solid var(--line);padding:6px 14px;border-radius:16px;cursor:pointer;font-size:13px;}
  .filter-row button.active{background:var(--olive);color:#fff;border-color:var(--olive);}

  table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:10px;overflow:hidden;}
  th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);font-size:13.5px;}
  th{background:rgba(107,30,35,.06);color:var(--maroon);}
  tr:last-child td{border-bottom:none;}

  .badge{padding:3px 10px;border-radius:12px;font-size:11.5px;font-weight:700;}
  .badge.pending{background:#f5e3c0;color:#8a5a00;}
  .badge.accepted{background:#d7ecd4;color:#2c6b2f;}
  .badge.rejected{background:#f5d3d3;color:#a12b2b;}
  .badge.completed{background:#d3e2f5;color:#1f4c8a;}
  .badge.archived{background:#e3e3e3;color:#666;}

  .btn{border:none;padding:6px 12px;border-radius:14px;font-size:12px;font-weight:700;cursor:pointer;margin-left:4px;}
  .btn.accept{background:var(--olive);color:#fff;}
  .btn.reject{background:#a12b2b;color:#fff;}
  .btn.complete{background:#1f4c8a;color:#fff;}
  .btn.archive{background:#888;color:#fff;}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--ink);}

  .expand-row td{background:#fff8ea;font-size:13px;}
  .items-list{margin:0;padding-right:18px;}

  .toggle{width:40px;height:22px;border-radius:12px;background:#ccc;position:relative;cursor:pointer;border:none;display:inline-block;}
  .toggle.on{background:var(--olive);}
  .toggle::after{content:'';position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;}
  .toggle.on::after{right:20px;}

  .add-form{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:18px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
  .add-form label{font-size:12px;font-weight:700;display:block;margin-bottom:4px;}
  .add-form input, .add-form select{padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-family:'Tajawal';}
  .add-form button{background:var(--maroon);color:#fff3e0;border:none;padding:9px 18px;border-radius:8px;font-weight:700;cursor:pointer;}

  .empty{text-align:center;color:var(--muted);padding:30px;}
</style>
</head>

<div id="dashboard" style="display:none;">
  <header>
    <h1 class="display">🥩 لوحة تحكم بيت الممبار</h1>
    <button onclick="location.reload()">خروج</button>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="orders" onclick="showTab('orders')">الطلبات</div>
    <div class="tab" data-tab="products" onclick="showTab('products')">المنتجات</div>
    <div class="tab" data-tab="coupons" onclick="showTab('coupons')">الكوبونات</div>
  </div>

  <!-- ORDERS -->
  <div class="panel active" id="panel-orders">
    <div class="stat-row" id="order-stats"></div>
    <div class="filter-row" id="order-filters">
      <button class="active" data-status="all" onclick="filterOrders('all')">الكل</button>
      <button data-status="pending" onclick="filterOrders('pending')">قيد الانتظار</button>
      <button data-status="accepted" onclick="filterOrders('accepted')">مقبول</button>
      <button data-status="completed" onclick="filterOrders('completed')">مكتمل</button>
      <button data-status="rejected" onclick="filterOrders('rejected')">مرفوض</button>
      <button data-status="archived" onclick="filterOrders('archived')">مؤرشف</button>
    </div>
    <table>
      <thead><tr><th>العميل</th><th>الجوال</th><th>النوع</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th><th>إجراءات</th></tr></thead>
      <tbody id="orders-body"></tbody>
    </table>
  </div>

  <!-- PRODUCTS -->
  <div class="panel" id="panel-products">
    <table>
      <thead><tr><th>الصنف</th><th>المنتج</th><th>السعر</th><th>الوحدة</th><th>متاح</th><th>كمية محدودة</th></tr></thead>
      <tbody id="products-body"></tbody>
    </table>
  </div>

  <!-- COUPONS -->
  <div class="panel" id="panel-coupons">
    <div class="add-form">
      <div><label>الكود</label><input type="text" id="cp-code" placeholder="RAMADAN10"></div>
      <div><label>النوع</label>
        <select id="cp-type"><option value="percent">نسبة %</option><option value="fixed">مبلغ ثابت</option></select>
      </div>
      <div><label>القيمة</label><input type="number" id="cp-value" placeholder="10"></div>
      <div><label>أقصى استخدام (اختياري)</label><input type="number" id="cp-max" placeholder="بدون حد"></div>
      <button onclick="addCoupon()">إضافة كوبون</button>
    </div>
    <table>
      <thead><tr><th>الكود</th><th>النوع</th><th>القيمة</th><th>مرات الاستخدام</th><th>فعال</th></tr></thead>
      <tbody id="coupons-body"></tbody>
    </table>

<script>
// ============================================
// إعدادات — عدّل الرابط وكلمة المرور
// ============================================
const SUPABASE_URL = 'https://ktusgmekunlnexynxigj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_QUdF9kkmmBY-WOaX-2Y5Hw_Sekd0fSX';
const ADMIN_PASSWORD = 'ayat12345';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function tryLogin(){
  const val = document.getElementById('pw').value;
  if(val === ADMIN_PASSWORD){
    sessionStorage.setItem('bam_admin','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    init();
  } else {
    document.getElementById('login-error').textContent = 'كلمة مرور غلط';
  }
}
if(sessionStorage.getItem('bam_admin')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  window.addEventListener('DOMContentLoaded', init);
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

let ALL_ORDERS = [];
let ORDER_ITEMS_MAP = {};
let currentFilter = 'all';

async function init(){
  await loadOrders();
  await loadProducts();
  await loadCoupons();
}

// ---------------- ORDERS ----------------
async function loadOrders(){
  const { data: orders, error } = await sb.from('orders').select('*').order('created_at', { ascending:false });
  if(error){ console.error(error); return; }
  ALL_ORDERS = orders;

  const { data: items } = await sb.from('order_items').select('*');
  ORDER_ITEMS_MAP = {};
  (items||[]).forEach(it=>{
    if(!ORDER_ITEMS_MAP[it.order_id]) ORDER_ITEMS_MAP[it.order_id]=[];
    ORDER_ITEMS_MAP[it.order_id].push(it);
  });

  renderStats();
  renderOrders();
}

function renderStats(){
  const pending = ALL_ORDERS.filter(o=>o.status==='pending').length;
  const today = new Date().toDateString();
  const todayOrders = ALL_ORDERS.filter(o=> new Date(o.created_at).toDateString()===today);
  const todayTotal = todayOrders.reduce((s,o)=>s+Number(o.total),0);
  document.getElementById('order-stats').innerHTML = `
    <div class="stat"><b>${pending}</b><span>طلبات قيد الانتظار</span></div>
    <div class="stat"><b>${todayOrders.length}</b><span>طلبات اليوم</span></div>
    <div class="stat"><b>${todayTotal.toFixed(0)}</b><span>مبيعات اليوم (ريال)</span></div>
  `;
}

function filterOrders(status){
  currentFilter = status;
  document.querySelectorAll('#order-filters button').forEach(b=>b.classList.toggle('active', b.dataset.status===status));
  renderOrders();
}

function renderOrders(){
  const body = document.getElementById('orders-body');
  const list = currentFilter==='all' ? ALL_ORDERS : ALL_ORDERS.filter(o=>o.status===currentFilter);
  if(list.length===0){ body.innerHTML = `<tr><td colspan="7" class="empty">لا توجد طلبات</td></tr>`; return; }

  body.innerHTML = list.map(o=>{
    const items = ORDER_ITEMS_MAP[o.id]||[];
    const itemsHtml = items.map(it=>`<li>${it.product_name} — ${it.quantity} ${it.unit} × ${it.price} ريال</li>`).join('');
    const date = new Date(o.created_at).toLocaleString('ar-SA');
    let actions = '';
    if(o.status==='pending'){
      actions = `<button class="btn accept" onclick="updateStatus('${o.id}','accepted')">قبول</button>
                 <button class="btn reject" onclick="updateStatus('${o.id}','rejected')">رفض</button>`;
    } else if(o.status==='accepted'){
      actions = `<button class="btn complete" onclick="updateStatus('${o.id}','completed')">إتمام</button>`;
    } else if(o.status==='completed' || o.status==='rejected'){
      actions = `<button class="btn archive" onclick="updateStatus('${o.id}','archived')">أرشفة</button>`;
    } else {
      actions = '—';
    }
    actions += ` <button class="btn ghost" onclick="toggleExpand('${o.id}')">التفاصيل</button>`;
    const typeLabel = o.order_type === 'pickup' ? '🏪 استلام' : '🚚 توصيل';
    const addressLine = o.order_type === 'pickup'
      ? o.customer_address
      : `<a href="${o.customer_address}" target="_blank" style="color:var(--maroon);font-weight:700;">فتح الموقع على الخريطة 📍</a>`;
    return `
      <tr>
        <td>${o.customer_name}</td>
        <td>${o.customer_phone}</td>
        <td>${typeLabel}</td>
        <td>${Number(o.total).toFixed(0)} ريال</td>
        <td><span class="badge ${o.status}">${statusLabel(o.status)}</span></td>
        <td>${date}</td>
        <td>${actions}</td>
      </tr>
      <tr class="expand-row" id="exp-${o.id}" style="display:none;">
        <td colspan="7">
          <b>الموقع:</b> ${addressLine}<br>
          ${o.notes ? '<b>ملاحظات:</b> '+o.notes+'<br>' : ''}
          ${o.coupon_code ? '<b>كوبون:</b> '+o.coupon_code+' (خصم '+Number(o.discount).toFixed(0)+' ريال)<br>' : ''}
          <b>الأصناف:</b>
          <ul class="items-list">${itemsHtml}</ul>
        </td>
      </tr>
    `;
  }).join('');
}

function statusLabel(s){
  return {pending:'قيد الانتظار', accepted:'مقبول', rejected:'مرفوض', completed:'مكتمل', archived:'مؤرشف'}[s] || s;
}

function toggleExpand(id){
  const row = document.getElementById('exp-'+id);
  row.style.display = row.style.display==='none' ? 'table-row' : 'none';
}

async function updateStatus(id, status){
  const { error } = await sb.from('orders').update({ status }).eq('id', id);
  if(error){ alert('حصل خطأ'); console.error(error); return; }
  await loadOrders();
}

// ---------------- PRODUCTS ----------------
async function loadProducts(){
  const { data, error } = await sb.from('products').select('*').order('category').order('sort_order');
  if(error){ console.error(error); return; }
  const body = document.getElementById('products-body');
  body.innerHTML = data.map(p=>`
    <tr>
      <td>${p.category}</td>
      <td>${p.name}</td>
      <td>${p.price ?? (p.price_note||'—')}</td>
      <td>${p.unit}</td>
      <td><button class="toggle ${p.available?'on':''}" onclick="toggleField('${p.id}','available',${!p.available})"></button></td>
      <td><button class="toggle ${p.limited?'on':''}" onclick="toggleField('${p.id}','limited',${!p.limited})"></button></td>
    </tr>
  `).join('');
}

async function toggleField(id, field, value){
  const patch = {}; patch[field]=value;
  const { error } = await sb.from('products').update(patch).eq('id', id);
  if(error){ alert('حصل خطأ'); console.error(error); return; }
  await loadProducts();
}

// ---------------- COUPONS ----------------
async function loadCoupons(){
  const { data, error } = await sb.from('coupons').select('*').order('created_at', { ascending:false });
  if(error){ console.error(error); return; }
  const body = document.getElementById('coupons-body');
  if(!data.length){ body.innerHTML = `<tr><td colspan="5" class="empty">لا يوجد كوبونات</td></tr>`; return; }
  body.innerHTML = data.map(c=>`
    <tr>
      <td>${c.code}</td>
      <td>${c.discount_type==='percent'?'نسبة %':'مبلغ ثابت'}</td>
      <td>${c.discount_value}${c.discount_type==='percent'?'%':' ريال'}</td>
      <td>${c.used_count}${c.max_uses ? ' / '+c.max_uses : ''}</td>
      <td><button class="toggle ${c.active?'on':''}" onclick="toggleCoupon('${c.id}',${!c.active})"></button></td>
    </tr>
  `).join('');
}

async function toggleCoupon(id, value){
  const { error } = await sb.from('coupons').update({ active: value }).eq('id', id);
  if(error){ alert('حصل خطأ'); console.error(error); return; }
  await loadCoupons();
}

async function addCoupon(){
  const code = document.getElementById('cp-code').value.trim();
  const type = document.getElementById('cp-type').value;
  const value = parseFloat(document.getElementById('cp-value').value);
  const max = document.getElementById('cp-max').value ? parseInt(document.getElementById('cp-max').value) : null;
  if(!code || !value){ alert('اكتب الكود والقيمة'); return; }
  const { error } = await sb.from('coupons').insert({ code, discount_type:type, discount_value:value, max_uses:max, active:true });
  if(error){ alert('الكود ده مستخدم قبل كده أو حصل خطأ'); console.error(error); return; }
  document.getElementById('cp-code').value='';
  document.getElementById('cp-value').value='';
  document.getElementById('cp-max').value='';
  await loadCoupons();
}
</script>
</body>
</html>
